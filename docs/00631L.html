<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{--bg:#0f1118;--sf:#181c28;--sf2:#1e2333;--bd:#2a3042;--tx:#e2e6ef;--tx2:#8b93a8;
--up:#e85d5d;--up2:rgba(232,93,93,.12);--dn:#4ec9a0;--dn2:rgba(78,201,160,.12);
--am:#f59e0b;--bl:#3b82f6;--bl2:rgba(59,130,246,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
/* ── Header ── */
.hd{padding:10px 20px 0;border-bottom:1px solid var(--bd)}
.hd-r1{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.hd h1{font-size:18px;font-weight:700;white-space:nowrap} .hd h1 b{color:var(--bl)}
.hd-badges{display:flex;gap:8px;align-items:center}
.sb2{padding:4px 14px;border-radius:6px;font-weight:600;font-size:13px;letter-spacing:.5px}
.sb2.long{background:var(--bl2);color:#6daaff;border:1.5px solid rgba(59,130,246,.4)}
.sb2.flat{background:rgba(139,147,168,.1);color:#9aa3b8;border:1.5px solid rgba(139,147,168,.2)}
.sb2.act{padding:4px 14px;border-radius:6px;font-weight:600;font-size:13px;letter-spacing:.5px}
.sb2.act.buy{background:rgba(232,93,93,.18);color:#f08080;border:1.5px solid rgba(232,93,93,.4)}
.sb2.act.sell{background:rgba(78,201,160,.18);color:#6ddbb8;border:1.5px solid rgba(78,201,160,.4)}
.sb2.act.hold{background:rgba(100,116,139,.08);color:#94a3b8;border:1.5px solid rgba(100,116,139,.2)}
.hd-r1-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hd-r2{display:flex;align-items:center;gap:6px;padding-bottom:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hd-r2::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:var(--sf2);font:12px 'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.chip .cl{color:var(--tx2);font-size:11px} .chip .cv{color:var(--tx);font-weight:500}
/* ── Year Tabs ── */
.ctl{padding:0 20px;display:flex;gap:0;border-bottom:1px solid var(--bd);background:var(--sf);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ctl::-webkit-scrollbar{display:none}
.yb{padding:8px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--tx2);font:12px 'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.yb:hover{color:var(--tx)} .yb.on{color:#fff;border-bottom-color:var(--bl);font-weight:500}
/* ── Main Layout ── */
.mn{display:flex;height:calc(100vh - 120px);overflow:hidden}
.cc{flex:1;min-width:0;display:flex;flex-direction:column}
.cb{padding:4px 16px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--tx2)}
.lg{display:flex;gap:10px} .li{display:flex;align-items:center;gap:3px} .ld{width:7px;height:7px;border-radius:2px}
.cw{flex:1;position:relative;min-height:0} .cw canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none}
.tip{position:fixed;background:rgba(24,28,40,.95);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;font:12px 'JetBrains Mono',monospace;color:var(--tx);pointer-events:none;display:none;z-index:100;white-space:nowrap;line-height:1.7;backdrop-filter:blur(8px)}

.rsb{width:360px;min-width:360px;border-left:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.sh{padding:10px 16px 8px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:500;color:var(--tx2)}
.el{flex:1;overflow-y:auto;padding:4px 0}
.ei{padding:8px 14px;margin:2px 8px;cursor:pointer;transition:all .15s ease;border-left:3px solid transparent;border-radius:0 6px 6px 0;display:flex;align-items:center;gap:10px}
.ei:hover{background:var(--sf2)} .ei.on{background:var(--sf2);border-left-color:var(--bl)} .ei.on.xt{border-left-color:var(--dn)}
.em{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.em.en{background:var(--bl)} .em.ex{background:var(--dn)}
.ed{font:500 13px 'JetBrains Mono',monospace} .ep{color:var(--tx2);font-size:11px;margin-top:1px;line-height:1.3}

.tr{padding:5px 9px;background:var(--sf);border-left:2px solid var(--am);border-radius:0 4px 4px 0;margin-bottom:3px;font-size:11px;line-height:1.5}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ic{padding:5px 9px;background:var(--bg);border-radius:4px;font-size:11px;display:flex;justify-content:space-between;gap:4px}
.il{color:var(--tx2)} .iv{font-family:'JetBrains Mono',monospace;font-weight:500} .iv.on{color:var(--up)} .iv.off{color:var(--dn)}
.iv.pnl-pos{color:var(--up);font-size:15px;font-weight:700} .iv.pnl-neg{color:var(--dn);font-size:15px;font-weight:700}
.cg{display:flex;gap:4px;flex-wrap:wrap}
.cc2{padding:3px 8px;border-radius:4px;font:11px 'JetBrains Mono',monospace;font-weight:500}
.cc2.on{background:rgba(232,93,93,.12);color:var(--up)} .cc2.off{background:var(--bg);color:var(--tx2)}

*{scrollbar-width:thin;scrollbar-color:var(--bd) transparent}

@media(max-width:1023px){
  .mn{flex-direction:column;height:auto;min-height:calc(100vh - 120px)}

  .cw{min-height:45vh}

@media(max-width:599px){

  .chip{padding:2px 8px;font-size:11px}

  .cw{min-height:300px}
  .rsb{max-height:50vh}
  .ig{grid-template-columns:1fr}
  .cb{padding:4px 10px}
  .ei{padding:6px 10px;margin:2px 4px}

/* ── Lock UI ── */
.lock-area{display:inline-flex;align-items:center;gap:6px;margin-left:6px;flex-shrink:0}

.pw-input:focus{border-color:var(--bl)}
.pw-input.show{display:block}

  cx.fillStyle='#8b93a8';cx.font='10px JetBrains Mono';cx.textAlign='left';
  cx.fillText('TAIEX',PL+2,kP.y+12);
  if(vLen<yD.length){
    cx.fillStyle='#f59e0b';cx.font='10px JetBrains Mono';cx.textAlign='right';
    cx.fillText(vD[0].d+' ~ '+vD[vD.length-1].d+' ('+vLen+'d)',W-PR-2,kP.y+12);
  }

  /* ── Volume Panel ── */
  {
    const vols=vD.map(r=>r.vol).filter(v=>v>0);
    if(vols.length){
      const vMx=Math.max(...vols)*1.05;
      cx.fillStyle='rgba(24,28,40,0.4)';cx.fillRect(PL,vP.y,cw,vP.h);
      cx.strokeStyle='rgba(42,48,66,0.2)';cx.lineWidth=0.5;cx.strokeRect(PL,vP.y,cw,vP.h);

      for(let i=vs;i<ve;i++){
        const r=yD[i];if(!r.vol)continue;
        const bull=r.c>=r.o;
        cx.fillStyle=bull?'rgba(232,93,93,0.4)':'rgba(78,201,160,0.4)';
        const barH=Math.max(1,(r.vol/vMx)*vP.h);
        cx.fillRect(xS(i)-bw,vP.y+vP.h-barH,bw*2,barH);
      }
      cx.fillStyle='#8b93a8';cx.font='9px JetBrains Mono';cx.textAlign='left';
      cx.fillText('Vol',PL+2,vP.y+9);
      cx.fillText(Math.round(vMx)+'\u5104',W-PR+3,vP.y+9);
    }
  }

  /* ── X-axis ── */
  cx.fillStyle='#8b93a8';cx.font='10px JetBrains Mono';cx.textAlign='center';
  if(vLen<=60){
    const step=vLen<=30?1:2;
    for(let i=vs;i<ve;i+=step){cx.fillText(yD[i].d.slice(5),xS(i),H-PB+14)}
  } else {
    let lm='';
    for(let i=vs;i<ve;i++){const m=yD[i].d.slice(5,7);if(m!==lm){lm=m;cx.fillText(m+'\u6708',xS(i),H-PB+14)}}
  }
}

function renderList(){
  const el=document.getElementById('eL');
  if(!yE.length){el.innerHTML='<div style="padding:16px;color:var(--tx2);font-size:12px">\u6b64\u5e74\u5ea6\u7121\u4e8b\u4ef6</div>';return}
  el.innerHTML=yE.map((ev,i)=>{const isE=ev.type==='entry';const sg=isE?null:SG.find(s=>s.exit_sig===ev.d);const pnlHtml=sg?` <span style="color:${sg.pnl>=0?'var(--up)':'var(--dn)'};font-weight:700">${sg.pnl>=0?'+':''}${sg.pnl.toFixed(1)}%</span>`:'';const trigTxt=unlocked?(ev.triggers[0]||''):simpleTrig(ev.triggers[0]);return`<div class="ei ${isE?'':'xt'}" data-i="${i}"><div class="em ${isE?'en':'ex'}"></div><div style="min-width:0"><div class="ed">${ev.exec_d||ev.d} <span style="color:var(--tx2);font-size:10px">${isE?'\u8cb7\u9032':'\u8ce3\u51fa'}</span>${pnlHtml}</div><div class="ep">${trigTxt}</div></div></div>`}).join('');
  el.querySelectorAll('.ei').forEach(it=>it.onclick=()=>pick(yE[+it.dataset.i]))
}

function pick(ev){
  sE=ev;draw();
  document.querySelectorAll('.ei').forEach(el=>el.classList.remove('on'));
  yE.forEach((e,i)=>{if(e.d===ev.d){const items=document.querySelectorAll('.ei');if(items[i]){items[i].classList.add('on');items[i].scrollIntoView({block:'nearest',behavior:'smooth'})}}});
  showDt(ev)
}

function showDt(ev){
  const dp=document.getElementById('dp');dp.classList.add('show');
  const isE=ev.type==='entry';
  const seg=isE?null:SG.find(s=>s.exit_sig===ev.d);
  const row=OD.find(r=>r.d===ev.d);
  let h=`<div class="dh">${ev.d} <span class="tg ${isE?'e':'x'}">${isE?'\u9032\u5834':'\u51fa\u5834'}</span></div>`;
  h+=`<div class="ds"><h4>\u6210\u4ea4</h4><div class="ig"><div class="ic"><span class="il">\u8a0a\u865f\u65e5</span><span class="iv">${ev.d}</span></div><div class="ic"><span class="il">\u6210\u4ea4\u65e5</span><span class="iv">${ev.exec_d||'N/A'}</span></div><div class="ic"><span class="il">TAIEX</span><span class="iv">${ev.tc}</span></div><div class="ic"><span class="il">ETF\u958b\u76e4\u50f9</span><span class="iv">${ev.etf_exec_p||'N/A'}</span></div></div></div>`;
  if(seg){const pc=seg.pnl;h+=`<div class="ds"><h4>\u640d\u76ca</h4><div class="ig"><div class="ic"><span class="il">\u8cb7</span><span class="iv">${seg.buy_p}</span></div><div class="ic"><span class="il">\u8ce3</span><span class="iv">${seg.sell_p}</span></div><div class="ic"><span class="il">\u640d\u76ca</span><span class="iv ${pc>=0?'pnl-pos':'pnl-neg'}">${pc>=0?'+':''}${pc.toFixed(2)}%</span></div><div class="ic"><span class="il">\u671f\u9593</span><span class="iv">${seg.entry_exec}~${seg.exit_exec||'\u6301\u5009\u4e2d'}</span></div></div></div>`}
  h+=`<div class="ds"><h4>\u89f8\u767c</h4>${ev.triggers.map(t=>`<div class="tr">${unlocked?t:simpleTrig(t)}</div>`).join('')}</div>`;
  if(unlocked&&row){
    const KL=['k1','k2','k3','k4','k5','k6','k7'];
    const KN=['\u9031\u7dda\u718a','\u6708\u7dda\u718a','\u50f9<MA30','ADL\u975e\u591a','Mom3M<0','CCI20<0','\u6025\u8dcc\u4fdd\u8b77'];
    h+=`<div class="ds"><h4>\u689d\u4ef6</h4><div class="cg">${KL.map((k,i)=>`<div class="cc2 ${row[k]?'on':'off'}">${KN[i]}</div>`).join('')}</div></div>`;
    h+=`<div class="ds"><h4>\u6307\u6a19</h4><div class="ig"><div class="ic"><span class="il">\u4e56\u96e290d</span><span class="iv${row.dev!==null&&row.dev<-5?' on':row.dev!==null&&row.dev>15?' on':''}">${row.dev!==null?row.dev+'%':'N/A'}</span></div><div class="ic"><span class="il">CCI20</span><span class="iv${row.cci!==null&&(row.cci>200||row.cci<-200)?' on':''}">${row.cci!==null?row.cci:'N/A'}</span></div><div class="ic"><span class="il">ADL</span><span class="iv${Math.abs(row.adl)>0.3?' on':''}">${(row.adl*100).toFixed(1)}%</span></div><div class="ic"><span class="il">VHF(35)</span><span class="iv${row.vhf!==null&&row.vhf>0.2?' on':''}">${row.vhf!==null?row.vhf:'N/A'}</span></div><div class="ic"><span class="il">\u6210\u4ea4\u91cf</span><span class="iv">${row.vol}\u5104</span></div></div></div>`;
  }
  dp.innerHTML=h
}

function showDayInfo(r){
  const dp=document.getElementById('dp');dp.classList.add('show');
  let h=`<div class="dh">${r.d} <span style="font-size:12px;color:${r.pos?'var(--bl)':'var(--tx2)'}">${r.pos?'\u6301\u5009':'\u7a7a\u624b'}</span></div>`;
  h+=`<div class="ds"><h4>TAIEX</h4><div class="ig"><div class="ic"><span class="il">\u958b</span><span class="iv">${r.o}</span></div><div class="ic"><span class="il">\u9ad8</span><span class="iv">${r.h}</span></div><div class="ic"><span class="il">\u4f4e</span><span class="iv">${r.l}</span></div><div class="ic"><span class="il">\u6536</span><span class="iv">${r.c}</span></div></div></div>`;
  if(unlocked){
    const KL=['k1','k2','k3','k4','k5','k6','k7'];
    const KN=['\u9031\u7dda\u718a','\u6708\u7dda\u718a','\u50f9<MA30','ADL\u975e\u591a','Mom3M<0','CCI20<0','\u6025\u8dcc\u4fdd\u8b77'];
    h+=`<div class="ds"><h4>\u6307\u6a19</h4><div class="ig"><div class="ic"><span class="il">\u4e56\u96e290d</span><span class="iv${r.dev!==null&&(r.dev<-5||r.dev>15)?' on':''}">${r.dev!==null?r.dev+'%':'N/A'}</span></div><div class="ic"><span class="il">CCI(20)</span><span class="iv${r.cci!==null&&(r.cci>200||r.cci<-200)?' on':''}">${r.cci!==null?r.cci:'N/A'}</span></div><div class="ic"><span class="il">ADL</span><span class="iv${Math.abs(r.adl)>0.3?' on':''}">${(r.adl*100).toFixed(1)}%</span></div><div class="ic"><span class="il">VHF(35)</span><span class="iv${r.vhf!==null&&r.vhf>0.2?' on':''}">${r.vhf!==null?r.vhf:'N/A'}</span></div><div class="ic"><span class="il">\u6210\u4ea4\u91cf</span><span class="iv">${r.vol}\u5104</span></div></div></div>`;
    h+=`<div class="ds"><h4>\u689d\u4ef6</h4><div class="cg">${KL.map((k,i)=>`<div class="cc2 ${r[k]?'on':'off'}">${KN[i]}</div>`).join('')}</div></div>`;
  }
  dp.innerHTML=h;
  sE=null;draw();
  document.querySelectorAll('.ei').forEach(el=>el.classList.remove('on'));
}

/* ── Zoom (wheel) & Pan (drag) ── */
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  if(!yD.length)return;
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left;
  const ratio=(mx-PL)/cm.cw;
  const curLen=vEnd-vStart;
  const factor=e.deltaY<0?(1-ZOOM_STEP):(1+ZOOM_STEP);
  let newLen=Math.round(curLen*factor);
  newLen=Math.max(MIN_BARS,Math.min(yD.length,newLen));
  if(newLen===curLen)return;
  const anchor=vStart+ratio*curLen;
  vStart=Math.round(anchor-ratio*newLen);
  vEnd=vStart+newLen;
  if(vStart<0){vStart=0;vEnd=newLen}
  if(vEnd>yD.length){vEnd=yD.length;vStart=vEnd-newLen}
  draw();
},{passive:false});

cv.addEventListener('mousedown',e=>{
  isDragging=true;dragMoved=false;dragStartX=e.clientX;dragStartVS=vStart;
  cv.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-dragStartX;
  if(Math.abs(dx)>3)dragMoved=true;
  if(vEnd-vStart>=yD.length)return;
  const barsPerPx=(vEnd-vStart)/cm.cw;
  let shift=Math.round(-dx*barsPerPx);
  let ns=dragStartVS+shift;
  const curLen=vEnd-vStart;
  ns=Math.max(0,Math.min(yD.length-curLen,ns));
  vStart=ns;vEnd=ns+curLen;
  draw();
});
window.addEventListener('mouseup',()=>{
  if(isDragging){isDragging=false;cv.style.cursor='crosshair'}
});

/* ── Touch: pan + pinch zoom ── */
let touchStartDist=0,touchStartVS=0,touchStartVE=0,touchDragged=false;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    isDragging=true;touchDragged=false;
    dragStartX=e.touches[0].clientX;dragStartVS=vStart;
  } else if(e.touches.length===2){
    isDragging=false;
    touchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    touchStartVS=vStart;touchStartVE=vEnd;
  }
},{passive:true});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const dx=e.touches[0].clientX-dragStartX;
    if(Math.abs(dx)>3)touchDragged=true;
    if(vEnd-vStart>=yD.length&&!touchDragged)return;
    const barsPerPx=(vEnd-vStart)/(cm.cw||1);
    let shift=Math.round(-dx*barsPerPx);
    let ns=dragStartVS+shift;
    const curLen=vEnd-vStart;
    ns=Math.max(0,Math.min(yD.length-curLen,ns));
    vStart=ns;vEnd=ns+curLen;
    draw();
  } else if(e.touches.length===2&&touchStartDist>0){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const scale=touchStartDist/dist;
    const origLen=touchStartVE-touchStartVS;
    let newLen=Math.round(origLen*scale);
    newLen=Math.max(MIN_BARS,Math.min(yD.length,newLen));
    const mid=(touchStartVS+touchStartVE)/2;
    vStart=Math.round(mid-newLen/2);
    vEnd=vStart+newLen;
    if(vStart<0){vStart=0;vEnd=newLen}
    if(vEnd>yD.length){vEnd=yD.length;vStart=vEnd-newLen}
    draw();
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  if(e.touches.length===0){
    if(!touchDragged&&e.changedTouches.length===1){
      const t=e.changedTouches[0];
      const rect=cv.getBoundingClientRect();
      handleTap(t.clientX-rect.left,t.clientY-rect.top);
    }
    isDragging=false;touchStartDist=0;
  }
},{passive:true});

function handleTap(mx,my){
  if(!yD.length||!cm.xS)return;
  const ratio=(mx-PL)/cm.cw;const idx=Math.round(cm.vs+ratio*cm.vLen-0.5);
  if(idx<cm.vs||idx>=cm.ve)return;
  const r=yD[idx];
  const d2i={};yD.forEach((ri,i)=>d2i[ri.d]=i);
  let evMatch=null,minD=30;
  yE.forEach(ev=>{
    const xi=ev.exec_d?d2i[ev.exec_d]:d2i[ev.d];
    if(xi===undefined)return;
    const ex=cm.xS(xi),ey=cm.kline.yS(ev.exec_p||ev.tc);
    const dist=Math.sqrt((mx-ex)**2+(my-ey)**2);
    if(dist<minD){minD=dist;evMatch=ev}
  });
  if(evMatch){pick(evMatch)} else {showDayInfo(r)}
}

/* ── Tooltip (mouse only) ── */
cv.addEventListener('mousemove',e=>{
  if(!yD.length||!cm.xS||isDragging){tip.style.display='none';return}
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left;
  const ratio=(mx-PL)/cm.cw;const idx=Math.round(cm.vs+ratio*cm.vLen-0.5);
  if(idx<cm.vs||idx>=cm.ve){tip.style.display='none';return}
  const r=yD[idx];

  let html=`<b>${r.d}</b> ${r.pos?'<span style="color:var(--bl)">\u6301\u5009</span>':'<span style="color:var(--tx2)">\u7a7a\u624b</span>'}`;
  html+=`<br>\u958b${r.o} \u9ad8${r.h} \u4f4e${r.l} \u6536${r.c}`;
  if(unlocked){
    const mas=[];
    if(r.ma20)mas.push(`<span style="color:#00bcd4">M20:${r.ma20}</span>`);
    if(r.ma60)mas.push(`<span style="color:#a282f6">M60:${r.ma60}</span>`);
    if(r.ma240)mas.push(`<span style="color:#ffa500">M240:${r.ma240}</span>`);
    if(mas.length)html+=`<br>${mas.join(' ')}`;
    const devC=r.dev!==null?(r.dev<-5||r.dev>15?'color:#e85d5d':'color:var(--tx)'):'';
    const cciC=r.cci!==null?(r.cci<-200||r.cci>200?'color:#e85d5d':'color:var(--tx)'):'';
    const adlC=Math.abs(r.adl)>0.3?'color:#e85d5d':'color:var(--tx)';
    const vhfC=r.vhf!==null?(r.vhf>0.2?'color:var(--bl)':'color:var(--tx)'):'';
    html+=`<br><span style="${devC}">\u4e56\u96e2:${r.dev!==null?r.dev+'%':'N/A'}</span> <span style="${cciC}">CCI:${r.cci!==null?r.cci:'N/A'}</span>`;
    html+=`<br><span style="${adlC}">ADL:${(r.adl*100).toFixed(1)}%</span> <span style="${vhfC}">VHF:${r.vhf!==null?r.vhf:'N/A'}</span>`;
    const KL=['k1','k2','k3','k4','k5','k6','k7'];
    const condOn=KL.reduce((n,k)=>n+(r[k]?1:0),0);
    if(condOn>0)html+=`<br>\u718a\u5e02\u689d\u4ef6: <span style="color:#e85d5d">${condOn}/7</span>`;
  }

  tip.style.display='block';
  let tx=e.clientX+14,ty=e.clientY-60;
  if(tx+300>window.innerWidth)tx=e.clientX-300;
  if(ty<0)ty=e.clientY+14;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
  tip.innerHTML=html;
});
cv.addEventListener('mouseleave',()=>tip.style.display='none');

cv.addEventListener('click',e=>{
  if(!yD.length||!cm.xS||dragMoved)return;
  const rect=cv.getBoundingClientRect();
  handleTap(e.clientX-rect.left,e.clientY-rect.top);
});

window.addEventListener('resize',()=>draw());
go(yrEv.length?yrEv[yrEv.length-1]:yrs[yrs.length-1]);
</script></body></html>
