<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TQQQ + PSQ Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{--bg:#0f1118;--sf:#181c28;--sf2:#1e2333;--bd:#2a3042;--tx:#e2e6ef;--tx2:#8b93a8;
--up:#e85d5d;--up2:rgba(232,93,93,.12);--dn:#4ec9a0;--dn2:rgba(78,201,160,.12);
--am:#f59e0b;--bl:#3b82f6;--bl2:rgba(59,130,246,.15);
--sh:#a855f7;--sh2:rgba(168,85,247,.15)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}
.hd{padding:10px 20px 0;border-bottom:1px solid var(--bd)}
.hd-r1{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.hd h1{font-size:18px;font-weight:700;white-space:nowrap} .hd h1 b{color:var(--bl)} .hd h1 i{color:var(--sh);font-style:normal}
.hd-badges{display:flex;gap:8px;align-items:center}
.sb2{padding:4px 14px;border-radius:6px;font-weight:600;font-size:13px;letter-spacing:.5px;display:inline-flex;align-items:baseline;gap:6px}
.sb2 .sb2-lb{font-size:10px;font-weight:500;color:var(--tx2);letter-spacing:1px;text-transform:uppercase}
.sb2.long{background:var(--bl2);color:#6daaff;border:1.5px solid rgba(59,130,246,.4)}
.sb2.short{background:var(--sh2);color:#c084fc;border:1.5px solid rgba(168,85,247,.4)}
.sb2.flat{background:rgba(139,147,168,.1);color:#9aa3b8;border:1.5px solid rgba(139,147,168,.2)}
.sb2.hold{background:rgba(139,147,168,.1);color:#9aa3b8;border:1.5px dashed rgba(139,147,168,.3)}
.sb2.action{background:rgba(245,158,11,.15);color:var(--am);border:1.5px solid rgba(245,158,11,.5)}
.hd-r1-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.hd-r2{display:flex;align-items:center;gap:6px;padding-bottom:8px;overflow-x:auto;scrollbar-width:none}
.hd-r2::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:var(--sf2);font:12px 'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.chip .cl{color:var(--tx2);font-size:11px} .chip .cv{color:var(--tx);font-weight:500}
.chip.mode-v2{background:rgba(232,93,93,.18)} .chip.mode-v2 .cv{color:#f08080}
.chip.mode-v1{background:rgba(78,201,160,.12)} .chip.mode-v1 .cv{color:#6ddbb8}
.ctl{padding:0 20px;display:flex;gap:0;border-bottom:1px solid var(--bd);background:var(--sf);overflow-x:auto;scrollbar-width:none}
.ctl::-webkit-scrollbar{display:none}
.yb{padding:8px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--tx2);font:12px 'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap}
.yb:hover{color:var(--tx)} .yb.on{color:#fff;border-bottom-color:var(--bl);font-weight:500}
.mn{display:flex;height:calc(100vh - 120px);overflow:hidden}
.cc{flex:1;min-width:0;display:flex;flex-direction:column}
.cb{padding:4px 16px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--tx2)}
.lg{display:flex;gap:10px} .li{display:flex;align-items:center;gap:3px} .ld{width:7px;height:7px;border-radius:2px}
.cw{flex:1;position:relative;min-height:0} .cw canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;touch-action:none}
.tip{position:fixed;background:rgba(24,28,40,.95);border:1px solid var(--bd);border-radius:6px;padding:8px 12px;font:12px 'JetBrains Mono',monospace;color:var(--tx);pointer-events:none;display:none;z-index:100;white-space:nowrap;line-height:1.7;backdrop-filter:blur(8px)}
.rsb{width:380px;min-width:380px;border-left:1px solid var(--bd);background:var(--sf);display:flex;flex-direction:column;overflow:hidden}
.sh-tab{display:flex;border-bottom:1px solid var(--bd)}
.sh-tab button{flex:1;padding:10px 16px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx2);font:13px 'Noto Sans TC',sans-serif;font-weight:500;cursor:pointer}
.sh-tab button.on{color:var(--tx);border-bottom-color:var(--bl)}
.sh-tab button.on.long{border-bottom-color:var(--bl)}
.sh-tab button.on.short{border-bottom-color:var(--sh)}
.el{flex:1;overflow-y:auto;padding:4px 0}
.ei{padding:8px 14px;margin:2px 8px;cursor:pointer;transition:all .15s ease;border-left:3px solid transparent;border-radius:0 6px 6px 0;display:flex;align-items:center;gap:10px}
.ei:hover{background:var(--sf2)}
.ei.on{background:var(--sf2)} .ei.on.lo{border-left-color:var(--bl)} .ei.on.sh{border-left-color:var(--sh)}
.em{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.em.lo-en{background:var(--bl)} .em.lo-ex{background:var(--dn)}
.em.sh-en{background:var(--sh)} .em.sh-ex{background:var(--am)}
.ed{font:500 13px 'JetBrains Mono',monospace} .ep{color:var(--tx2);font-size:11px;margin-top:1px;line-height:1.3}
.dt{border-top:1px solid var(--bd);padding:14px 16px;max-height:0;overflow:hidden;transition:max-height .3s ease;overflow-y:auto} .dt.show{max-height:55vh}
.dh{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tg{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.tg.lo-en{background:var(--bl2);color:var(--bl)} .tg.lo-ex{background:var(--dn2);color:var(--dn)}
.tg.sh-en{background:var(--sh2);color:var(--sh)} .tg.sh-ex{background:rgba(245,158,11,.15);color:var(--am)}
.ds{margin-bottom:12px} .ds h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--tx2);margin-bottom:5px;font-weight:500}
.tr{padding:5px 9px;background:var(--sf);border-left:2px solid var(--am);border-radius:0 4px 4px 0;margin-bottom:3px;font-size:11px;line-height:1.5}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ic{padding:5px 9px;background:var(--bg);border-radius:4px;font-size:11px;display:flex;justify-content:space-between;gap:4px}
.il{color:var(--tx2)} .iv{font-family:'JetBrains Mono',monospace;font-weight:500}
.iv.pnl-pos{color:var(--up);font-size:15px;font-weight:700} .iv.pnl-neg{color:var(--dn);font-size:15px;font-weight:700}
::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
*{scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
@media(max-width:1023px){
  .mn{flex-direction:column;height:auto;min-height:calc(100vh - 120px)}
  .rsb{width:100%;min-width:0;border-left:none;border-top:1px solid var(--bd);max-height:50vh}
  .cw{min-height:50vh}
  body{overflow-y:auto;height:auto}
}
@media(max-width:599px){
  .hd{padding:8px 12px 0} .hd-r1{gap:8px;margin-bottom:4px} .hd h1{font-size:16px}
  .hd-r1-right{margin-left:0;width:100%;justify-content:flex-start}
  .ctl{padding:0 12px} .yb{padding:6px 10px;font-size:11px}
  .cw{min-height:300px} .ig{grid-template-columns:1fr}
}
</style></head><body>

    const bodyH=Math.max(1,bodyB-bodyT);
    const color=bull?'#e85d5d':'#4ec9a0';
    cx.strokeStyle=color;cx.lineWidth=0.8;
    cx.beginPath();cx.moveTo(x,yS(r.h));cx.lineTo(x,yS(r.l));cx.stroke();
    cx.fillStyle=color;cx.fillRect(x-bw,bodyT,bw*2,bodyH);
  }

  // MA lines
  const maLabels=[];
  function drawMA(key,label,color,lw){
    cx.strokeStyle=color;cx.lineWidth=lw;cx.beginPath();
    let started=false;
    for(let i=vs;i<ve;i++){
      const v=yD[i][key];if(v===null||v===undefined)continue;
      const x=xS(i),y=yS(v);
      if(!started){cx.moveTo(x,y);started=true}else cx.lineTo(x,y);
    }
    cx.stroke();
    const last=yD[ve-1][key];
    if(last!==null&&last!==undefined) maLabels.push({label,color,val:last,y:yS(last)});
  }
  drawMA('ma200','MA200','rgba(255,165,0,0.5)',1.5);
  drawMA('ma60','MA60','rgba(162,130,246,0.7)',1.2);
  drawMA('ma20','MA20','rgba(0,188,212,0.7)',1);
  maLabels.sort((a,b)=>a.y-b.y);
  for(let i=1;i<maLabels.length;i++){if(maLabels[i].y-maLabels[i-1].y<12)maLabels[i].y=maLabels[i-1].y+12}
  maLabels.forEach(m=>{
    cx.fillStyle=m.color;cx.font='bold 10px JetBrains Mono';cx.textAlign='left';
    cx.fillText(m.label+' '+m.val.toFixed(m.val<10?2:0),PL+2,m.y-3);
  });

  // segment PnL labels
  ySG.forEach(sg=>{
    const ei=d2i[sg.entry_exec],xi=sg.exit_exec?d2i[sg.exit_exec]:null;
    if(ei===undefined)return;
    const endI=xi!==undefined?xi:yD.length-1;
    if(endI<vs||ei>=ve)return;
    const clampS=Math.max(vs,ei),clampE=Math.min(ve-1,endI);
    const midI=Math.round((clampS+clampE)/2);
    let maxH=0;for(let j=clampS;j<=clampE;j++){if(yD[j].h>maxH)maxH=yD[j].h;}
    const py=Math.max(kP.y+14,yS(maxH)-10);
    const txt=(sg.pnl>=0?'+':'')+sg.pnl.toFixed(1)+'%';
    cx.font='bold 10px JetBrains Mono';cx.textAlign='center';
    const tw=cx.measureText(txt).width;
    const isLong=sg.side==='LONG';
    const bgColor=sg.pnl>=0?(isLong?'rgba(232,93,93,0.15)':'rgba(232,93,93,0.15)'):(isLong?'rgba(78,201,160,0.15)':'rgba(78,201,160,0.15)');
    cx.fillStyle=bgColor;
    const px=xS(midI),pw=tw+8,ph=14;
    cx.beginPath();cx.roundRect(px-pw/2,py-ph+2,pw,ph,4);cx.fill();
    cx.fillStyle=sg.pnl>=0?'#e85d5d':'#4ec9a0';
    cx.fillText(txt,px,py);
    // label LONG/SHORT under PnL
    if(!isLong){
      cx.fillStyle='rgba(168,85,247,0.7)';cx.font='9px JetBrains Mono';
      cx.fillText('S',px+pw/2-5,py+8);
    }
  });

  // event markers
  yE.forEach(ev=>{
    const si=d2i[ev.d];
    if(si===undefined||si<vs||si>=ve)return;
    const sx=xS(si),isE=ev.type==='entry',isLong=ev.side==='LONG',isSel=sE&&sE.d===ev.d;
    const color=isLong?(isE?'#5b9cf6':'#4ec9a0'):(isE?'#a855f7':'#f59e0b');
    cx.save();cx.setLineDash([4,3]);cx.strokeStyle=color;cx.lineWidth=isSel?1.5:0.7;cx.globalAlpha=isSel?0.9:0.4;
    cx.beginPath();cx.moveTo(sx,kP.y);cx.lineTo(sx,kP.y+kP.h);cx.stroke();cx.restore();
    const label=(isLong?'L':'S')+(isE?'+':'-');
    cx.font='bold 9px JetBrains Mono';cx.textAlign='center';
    cx.fillStyle=color;cx.globalAlpha=isSel?1:0.7;
    cx.fillText(label,sx,isE?kP.y+kP.h-4:kP.y+11);cx.globalAlpha=1;
    // execution arrow
    const ey=yS(ev.etf_exec_p||ev.tc);
    const ms=isSel?9:6;
    cx.fillStyle=color;
    cx.beginPath();
    if(isE){cx.moveTo(sx,ey-ms);cx.lineTo(sx-ms*.8,ey+ms*.5);cx.lineTo(sx+ms*.8,ey+ms*.5)}
    else{cx.moveTo(sx,ey+ms);cx.lineTo(sx-ms*.8,ey-ms*.5);cx.lineTo(sx+ms*.8,ey-ms*.5)}
    cx.closePath();cx.fill();
    if(isSel){cx.strokeStyle=color;cx.lineWidth=2;cx.beginPath();cx.arc(sx,ey,ms+4,0,Math.PI*2);cx.stroke()}
  });

  cx.fillStyle='#8b93a8';cx.font='10px JetBrains Mono';cx.textAlign='left';
  cx.fillText('TQQQ',PL+2,kP.y+12);
  if(vLen<yD.length){
    cx.fillStyle='#f59e0b';cx.font='10px JetBrains Mono';cx.textAlign='right';
    cx.fillText(vD[0].d+' ~ '+vD[vD.length-1].d+' ('+vLen+'d)',W-PR-2,kP.y+12);
  }

  // Volume panel
  {
    const vols=vD.map(r=>r.vol).filter(v=>v>0);
    if(vols.length){
      const vMx=Math.max(...vols)*1.05;
      cx.fillStyle='rgba(24,28,40,0.4)';cx.fillRect(PL,vP.y,cw,vP.h);
      cx.strokeStyle='rgba(42,48,66,0.2)';cx.lineWidth=0.5;cx.strokeRect(PL,vP.y,cw,vP.h);
      for(let i=vs;i<ve;i++){
        const r=yD[i];if(!r.vol)continue;
        const bull=r.c>=r.o;
        cx.fillStyle=bull?'rgba(232,93,93,0.4)':'rgba(78,201,160,0.4)';
        const barH=Math.max(1,(r.vol/vMx)*vP.h);
        cx.fillRect(xS(i)-bw,vP.y+vP.h-barH,bw*2,barH);
      }
      cx.fillStyle='#8b93a8';cx.font='9px JetBrains Mono';cx.textAlign='left';
      cx.fillText('Vol',PL+2,vP.y+9);
      cx.fillText(Math.round(vMx)+'M',W-PR+3,vP.y+9);
    }
  }

  // X-axis
  cx.fillStyle='#8b93a8';cx.font='10px JetBrains Mono';cx.textAlign='center';
  if(vLen<=60){
    const step=vLen<=30?1:2;
    for(let i=vs;i<ve;i+=step){cx.fillText(yD[i].d.slice(5),xS(i),H-PB+14)}
  } else {
    let lm='';
    for(let i=vs;i<ve;i++){const m=yD[i].d.slice(5,7);if(m!==lm){lm=m;cx.fillText(m+'月',xS(i),H-PB+14)}}
  }
}

function eventLabel(ev,sg){
  // 完整 action 描述：TQQQ 進場 / TQQQ 停利 / TQQQ 停損 / TQQQ 災難止損(停利) / PSQ 開空 / PSQ 停利 / PSQ 停損
  const isE=ev.type==='entry',isLong=ev.side==='LONG',sym=isLong?'TQQQ':'PSQ';
  if(isE) return isLong ? 'TQQQ 進場' : 'PSQ 開空';
  // exit
  const isPathA21 = (ev.triggers||[]).some(t=>t.includes('災難'));
  const pnlSign = sg ? (sg.pnl>=0 ? '停利' : '停損') : '平倉';
  if(isPathA21) return sg ? `TQQQ 災難止損 (${pnlSign})` : 'TQQQ 災難止損';
  return `${sym} ${pnlSign}`;
}

function renderList(){
  const el=document.getElementById('eL');
  if(!yE.length){el.innerHTML='<div style="padding:16px;color:var(--tx2);font-size:12px">無事件</div>';return}
  // 同日事件分組
  const grouped={};
  yE.forEach(ev=>{ if(!grouped[ev.d]) grouped[ev.d]=[]; grouped[ev.d].push(ev) });
  const dates=Object.keys(grouped).sort();
  el.innerHTML=dates.map(d=>{
    const evs=grouped[d].slice();
    // exit 排前面 (符合「先平再開」直覺)
    evs.sort((a,b)=>(a.type==='exit'?0:1)-(b.type==='exit'?0:1));
    const partsHTML=evs.map(ev=>{
      const isE=ev.type==='entry';
      // 持倉中: 找對應的 ongoing segment (entry_exec=ev.d AND side=ev.side AND ongoing=true)
      const sg=isE
        ? SG.find(s=>s.entry_exec===ev.d&&s.side===ev.side&&s.ongoing)
        : SG.find(s=>s.exit_exec===ev.d&&s.side===ev.side);
      const lab=eventLabel(ev,sg);
      let pnl='';
      if(sg){
        pnl=` <span style="color:${sg.pnl>=0?'var(--up)':'var(--dn)'};font-weight:700">${sg.pnl>=0?'+':''}${sg.pnl.toFixed(1)}%</span>`;
        if(sg.ongoing) pnl += ` <span style="color:var(--tx2);font-size:10px">持倉中</span>`;
      }
      return `<span style="font-size:11px;font-weight:500">${lab}</span>${pnl}`;
    }).join(' <span style="color:var(--tx2);margin:0 3px">/</span> ');
    const dotsHTML=evs.map(ev=>{
      const isE=ev.type==='entry',isLong=ev.side==='LONG';
      return `<div class="em ${(isLong?'lo':'sh')+'-'+(isE?'en':'ex')}"></div>`;
    }).join('');
    const pricesHTML=evs.map(ev=>{
      const sym=ev.side==='LONG'?'TQQQ':'PSQ';
      return `${sym} $${ev.etf_exec_p||'—'}`;
    }).join(' · ');
    return `<div class="ei" data-d="${d}"><div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">${dotsHTML}</div><div style="min-width:0"><div class="ed">${d} ${partsHTML}</div><div class="ep">${pricesHTML}</div></div></div>`;
  }).join('');
  el.querySelectorAll('.ei').forEach(it=>{
    const d=it.dataset.d;
    it.onclick=()=>pickGroup(grouped[d]);
  });
}

function pickGroup(evs){
  // 高亮第一個事件 (sE)，顯示合併詳情
  sE=evs[0];draw();
  document.querySelectorAll('.ei').forEach(el=>el.classList.remove('on','lo','sh'));
  // 找到對應 .ei 並高亮
  const targetD=evs[0].d;
  document.querySelectorAll('.ei').forEach(it=>{
    if(it.dataset.d===targetD){
      it.classList.add('on','lo');
      it.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  });
  showDtGroup(evs);
}

function pick(ev){pickGroup([ev])}

function showDtGroup(evs){
  const dp=document.getElementById('dp');dp.classList.add('show');
  const d=evs[0].d;
  // 排序：exit 先，entry 後
  const sorted=evs.slice().sort((a,b)=>(a.type==='exit'?0:1)-(b.type==='exit'?0:1));
  let h=`<div class="dh">${d}</div>`;
  sorted.forEach(ev=>{
    const isE=ev.type==='entry',isLong=ev.side==='LONG';
    // 詳情面板：entry 也找 ongoing 段顯示「估計持倉中損益」
    const seg=isE
      ? SG.find(s=>s.entry_exec===ev.d&&s.side===ev.side&&s.ongoing)
      : SG.find(s=>s.exit_exec===ev.d&&s.side===ev.side);
    const tgClass=(isLong?'lo':'sh')+'-'+(isE?'en':'ex');
    const label=eventLabel(ev,seg);
    const sym=isLong?'TQQQ':'PSQ';
    const ongoingTag = (seg && seg.ongoing) ? '<span style="color:var(--tx2);font-size:10px;margin-left:6px">持倉中</span>' : '';
    h+=`<div class="ds"><h4><span class="tg ${tgClass}" style="font-size:10px;padding:2px 6px">${label}</span>${ongoingTag}</h4><div class="ig"><div class="ic"><span class="il">${sym} 開盤</span><span class="iv">$${ev.etf_exec_p||'N/A'}</span></div>`;
    if(seg){
      const pc=seg.pnl;
      const sellLabel = seg.ongoing ? '目前價' : '賣出';
      const pnlLabel = seg.ongoing ? '預估損益' : '損益';
      h+=`<div class="ic"><span class="il">買進</span><span class="iv">$${seg.buy_p}</span></div><div class="ic"><span class="il">${sellLabel}</span><span class="iv">$${seg.sell_p}</span></div><div class="ic"><span class="il">${pnlLabel}</span><span class="iv ${pc>=0?'pnl-pos':'pnl-neg'}">${pc>=0?'+':''}${pc.toFixed(2)}%</span></div><div class="ic"><span class="il">持有天</span><span class="iv">${seg.days}d</span></div>`;
    }
    h+=`</div></div>`;
  });
  dp.innerHTML=h;
}

function showDt(ev){showDtGroup([ev])}

function showDayInfo(r){
  const dp=document.getElementById('dp');dp.classList.add('show');
  const stStr=r.pos===1?'<span style="color:var(--bl)">持有 TQQQ</span>':(r.pos===-1?'<span style="color:var(--sh)">持有 PSQ</span>':'<span style="color:var(--tx2)">空手</span>');
  let h=`<div class="dh">${r.d} ${stStr}</div>`;
  h+=`<div class="ds"><h4>TQQQ OHLC</h4><div class="ig"><div class="ic"><span class="il">開</span><span class="iv">$${r.o}</span></div><div class="ic"><span class="il">高</span><span class="iv">$${r.h}</span></div><div class="ic"><span class="il">低</span><span class="iv">$${r.l}</span></div><div class="ic"><span class="il">收</span><span class="iv">$${r.c}</span></div></div></div>`;
  h+=`<div class="ds"><h4>指標</h4><div class="ig"><div class="ic"><span class="il">20d 波動</span><span class="iv">${r.rv!==null?r.rv+'%':'N/A'}</span></div><div class="ic"><span class="il">A21 mode</span><span class="iv">${r.rv!==null?(r.rv>80?'V2':'V1'):'N/A'}</span></div></div></div>`;
  dp.innerHTML=h;sE=null;draw();
  document.querySelectorAll('.ei').forEach(el=>el.classList.remove('on'));
}

cv.addEventListener('wheel',e=>{
  e.preventDefault();
  if(!yD.length)return;
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left;
  const ratio=(mx-PL)/cm.cw;
  const curLen=vEnd-vStart;
  const factor=e.deltaY<0?(1-ZOOM_STEP):(1+ZOOM_STEP);
  let newLen=Math.round(curLen*factor);
  newLen=Math.max(MIN_BARS,Math.min(yD.length,newLen));
  if(newLen===curLen)return;
  const anchor=vStart+ratio*curLen;
  vStart=Math.round(anchor-ratio*newLen);
  vEnd=vStart+newLen;
  if(vStart<0){vStart=0;vEnd=newLen}
  if(vEnd>yD.length){vEnd=yD.length;vStart=vEnd-newLen}
  draw();
},{passive:false});

cv.addEventListener('mousedown',e=>{isDragging=true;dragMoved=false;dragStartX=e.clientX;dragStartVS=vStart;cv.style.cursor='grabbing'});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const dx=e.clientX-dragStartX;
  if(Math.abs(dx)>3)dragMoved=true;
  if(vEnd-vStart>=yD.length)return;
  const barsPerPx=(vEnd-vStart)/cm.cw;
  let shift=Math.round(-dx*barsPerPx);
  let ns=dragStartVS+shift;
  const curLen=vEnd-vStart;
  ns=Math.max(0,Math.min(yD.length-curLen,ns));
  vStart=ns;vEnd=ns+curLen;draw();
});
window.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;cv.style.cursor='crosshair'}});

let touchStartDist=0,touchStartVS=0,touchStartVE=0,touchDragged=false;
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true;touchDragged=false;dragStartX=e.touches[0].clientX;dragStartVS=vStart;}
  else if(e.touches.length===2){isDragging=false;touchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);touchStartVS=vStart;touchStartVE=vEnd;}
},{passive:true});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const dx=e.touches[0].clientX-dragStartX;
    if(Math.abs(dx)>3)touchDragged=true;
    if(vEnd-vStart>=yD.length&&!touchDragged)return;
    const barsPerPx=(vEnd-vStart)/(cm.cw||1);
    let shift=Math.round(-dx*barsPerPx);
    let ns=dragStartVS+shift;
    const curLen=vEnd-vStart;
    ns=Math.max(0,Math.min(yD.length-curLen,ns));
    vStart=ns;vEnd=ns+curLen;draw();
  } else if(e.touches.length===2&&touchStartDist>0){
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const scale=touchStartDist/dist;
    const origLen=touchStartVE-touchStartVS;
    let newLen=Math.round(origLen*scale);
    newLen=Math.max(MIN_BARS,Math.min(yD.length,newLen));
    const mid=(touchStartVS+touchStartVE)/2;
    vStart=Math.round(mid-newLen/2);vEnd=vStart+newLen;
    if(vStart<0){vStart=0;vEnd=newLen} if(vEnd>yD.length){vEnd=yD.length;vStart=vEnd-newLen}
    draw();
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  if(e.touches.length===0){
    if(!touchDragged&&e.changedTouches.length===1){
      const t=e.changedTouches[0];const rect=cv.getBoundingClientRect();handleTap(t.clientX-rect.left,t.clientY-rect.top);
    }
    isDragging=false;touchStartDist=0;
  }
},{passive:true});

function handleTap(mx,my){
  if(!yD.length||!cm.xS)return;
  const ratio=(mx-PL)/cm.cw;const idx=Math.round(cm.vs+ratio*cm.vLen-0.5);
  if(idx<cm.vs||idx>=cm.ve)return;
  const r=yD[idx];
  const d2i={};yD.forEach((ri,i)=>d2i[ri.d]=i);
  let evMatch=null,minD=30;
  yE.forEach(ev=>{
    const xi=d2i[ev.d];
    if(xi===undefined)return;
    const ex=cm.xS(xi),ey=cm.kline.yS(ev.etf_exec_p||ev.tc);
    const dist=Math.sqrt((mx-ex)**2+(my-ey)**2);
    if(dist<minD){minD=dist;evMatch=ev}
  });
  if(evMatch){pick(evMatch)} else {showDayInfo(r)}
}

cv.addEventListener('mousemove',e=>{
  if(!yD.length||!cm.xS||isDragging){tip.style.display='none';return}
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left;
  const ratio=(mx-PL)/cm.cw;const idx=Math.round(cm.vs+ratio*cm.vLen-0.5);
  if(idx<cm.vs||idx>=cm.ve){tip.style.display='none';return}
  const r=yD[idx];
  let html=`<b>${r.d}</b> ${r.pos===1?'<span style="color:var(--bl)">持有 TQQQ</span>':(r.pos===-1?'<span style="color:var(--sh)">持有 PSQ</span>':'<span style="color:var(--tx2)">空手</span>')}`;
  html+=`<br>O$${r.o} H$${r.h} L$${r.l} C$${r.c}`;
  if(r.rv!==null)html+=`<br>20d vol: ${r.rv}% (${r.rv>80?'V2':'V1'})`;
  tip.style.display='block';
  let tx=e.clientX+14,ty=e.clientY-60;
  if(tx+260>window.innerWidth)tx=e.clientX-260;
  if(ty<0)ty=e.clientY+14;
  tip.style.left=tx+'px';tip.style.top=ty+'px';tip.innerHTML=html;
});
cv.addEventListener('mouseleave',()=>tip.style.display='none');
cv.addEventListener('click',e=>{
  if(!yD.length||!cm.xS||dragMoved)return;
  const rect=cv.getBoundingClientRect();handleTap(e.clientX-rect.left,e.clientY-rect.top);
});

window.addEventListener('resize',()=>draw());
go(yrs[yrs.length-1]);
</script></body></html>
